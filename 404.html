<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — The Seminyak</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">

  <style>
    .notfound-main {
      align-items: center;
      justify-content: center;
    }
    .notfound-card {
      max-width: 480px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .notfound-code {
      font-size: 64px;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: -2px;
      line-height: 1;
      margin-bottom: 18px;
    }
    .notfound-icon {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--gold-tint);
      color: var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }
    .notfound-title {
      font-size: 19px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
    }
    .notfound-text {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 28px;
      max-width: 360px;
    }
    .notfound-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
    }
    .notfound-actions button,
    .notfound-actions a.btn-outline {
      width: auto;
      flex: 1;
      min-width: 150px;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>

  <header>
    <div class="header-content">
      <img src="https://cdn-5d8995b3f911c90950a6130b.closte.com/wp-content/uploads/2024/08/the-seminyak-logo-aug24v1.png" alt="The Seminyak">
      <div class="brand-block">
        <span class="brand-eyebrow">The Seminyak</span>
        <span class="brand-name">Marketing Dashboard</span>
      </div>
    </div>
  </header>

  <main class="notfound-main">
    <div class="card notfound-card">

      <div class="notfound-icon">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="7"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          <line x1="8.5" y1="11" x2="13.5" y2="11"/>
        </svg>
      </div>

      <div class="notfound-code">404</div>
      <h1 class="notfound-title">Page not found</h1>
      <p class="notfound-text">
        The page you're looking for doesn't exist, may have been moved, or the link might be incorrect.
      </p>

      <div class="notfound-actions">
        <a href="index.html" class="btn-outline">Home</a>
        <a href="design.html" class="btn-outline">Design Request</a>
        <a href="link.html" class="btn-outline">Link Bank</a>
      </div>

    </div>
  </main>

  <footer>
    <span>&copy; 2026 The Seminyak Marketing Team</span>
  </footer>

</body>
</html>
